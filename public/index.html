<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影片剪輯部門排程系統</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#232c38; --line:#2e3a48;
    --txt:#e6edf3; --muted:#8b98a9; --accent:#3b82f6; --accent2:#2563eb;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --chip:#2d3744;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
       background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--accent)}
  .hidden{display:none !important}

  /* 登入畫面 */
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
         justify-content:center;flex-direction:column;z-index:50;padding:20px}
  #login h1{font-size:22px;margin:0 0 6px}
  #login p{color:var(--muted);margin:0 0 24px;text-align:center}
  .userGrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:520px}
  .userBtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
           padding:16px 22px;border-radius:12px;font-size:17px;min-width:110px}
  .userBtn:hover{border-color:var(--accent)}
  .addRow{margin-top:20px;display:flex;gap:8px}
  .addRow input{padding:10px;border-radius:8px;border:1px solid var(--line);
                background:var(--panel);color:var(--txt)}

  /* 頂列 */
  header{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line);
         display:flex;align-items:center;gap:10px;padding:8px 14px}
  header .brand{font-weight:700;white-space:nowrap}
  header .spacer{flex:1}
  .whoami{display:flex;align-items:center;gap:8px;background:var(--accent2);
          padding:6px 12px;border-radius:20px;font-weight:600}
  .whoami .dot{width:8px;height:8px;border-radius:50%;background:#fff}
  .offline{background:var(--red)!important}

  nav{display:flex;gap:4px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);
      padding:0 8px;position:sticky;top:49px;z-index:29}
  nav button{background:none;border:none;color:var(--muted);padding:12px 14px;font-size:14px;
             white-space:nowrap;border-bottom:2px solid transparent}
  nav button.active{color:var(--txt);border-bottom-color:var(--accent)}

  main{padding:16px;max-width:1200px;margin:0 auto}
  h2{font-size:18px;margin:0 0 14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:12px}
  label{font-size:13px;color:var(--muted);display:block;margin:8px 0 4px}
  input,select,textarea{width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);
         background:var(--panel2);color:var(--txt);font-size:14px}
  textarea{min-height:60px}
  .btn{background:var(--accent2);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-weight:600}
  .btn:hover{background:var(--accent)}
  .btn.sec{background:var(--chip);}
  .btn.danger{background:var(--red)}
  .btn.sm{padding:6px 10px;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .tag{display:inline-block;padding:2px 8px;border-radius:12px;background:var(--chip);font-size:12px}
  .light{display:inline-block;width:12px;height:12px;border-radius:50%}
  .green{background:var(--green)} .yellow{background:var(--yellow)} .red{background:var(--red)}
  .muted{color:var(--muted)}
  .pill{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.em{background:rgba(239,68,68,.18);color:#fca5a5}
  .pill.wa{background:rgba(234,179,8,.18);color:#fde047}
  .pill.ok{background:rgba(34,197,94,.18);color:#86efac}

  /* 彈窗 */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
         justify-content:center;z-index:40;padding:16px}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;
              padding:20px;max-width:680px;width:100%;max-height:88vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  .modalFoot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

  /* 月曆 */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{color:var(--muted);text-align:center;font-size:12px;padding:4px}
  .day{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px;min-height:84px;
       cursor:pointer}
  .day:hover{border-color:var(--accent)}
  .day .dnum{font-weight:700;font-size:13px}
  .day .mini{font-size:11px;color:var(--muted)}
  .day.em{border-color:var(--red)} .day.wa{border-color:var(--yellow)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);
         border:1px solid var(--line);padding:12px 18px;border-radius:10px;z-index:60;opacity:0;
         transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{border-color:var(--red)}

  /* 手機自適應（老闆用手機看儀表板） */
  @media (max-width:640px){
    main{padding:12px}
    .hideMobile{display:none}
    table.responsive thead{display:none}
    table.responsive tr{display:block;border:1px solid var(--line);border-radius:10px;
       margin-bottom:10px;padding:8px;background:var(--panel2)}
    table.responsive td{display:flex;justify-content:space-between;border:none;padding:5px 4px}
    table.responsive td::before{content:attr(data-label);color:var(--muted);font-size:12px;margin-right:10px}
    .grid.cols2,.grid.cols3{grid-template-columns:1fr !important}
  }
  .grid.cols2{grid-template-columns:1fr 1fr}
  .grid.cols3{grid-template-columns:1fr 1fr 1fr}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- 登入 / 選擇使用者 -->
<div id="login">
  <h1>🎬 影片剪輯部門排程系統</h1>
  <p>請選擇你的名字（支援多人同時登入，每台電腦記住自己的身分）</p>
  <div class="userGrid" id="userGrid"></div>
  <div class="addRow">
    <input id="newUserName" placeholder="新增成員名字…">
    <button class="btn" onclick="addUser()">新增</button>
  </div>
  <p class="muted" style="margin-top:18px;font-size:12px">新增的成員只能由管理者刪除</p>
</div>

<!-- 主畫面 -->
<div id="app" class="hidden">
  <header>
    <span class="brand">🎬 排程系統</span>
    <span class="spacer"></span>
    <span class="whoami" id="whoami"><span class="dot"></span><span id="whoName"></span></span>
    <button class="btn sm sec" onclick="logout()">切換</button>
  </header>
  <nav id="nav"></nav>
  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
// ===================================================================
// 基礎：身分、裝置指紋、API、輪詢、離線
// ===================================================================
const TABS = [
  ["warn","🚨 預警中心"],["cal","📅 月排程"],["work","✂️ 素材工作台"],
  ["dash","📊 部門儀表板"],["prod","💎 寵粉商品庫"],["videos","🎞 影片資料庫"],
  ["score","🏆 績效報表"],["settings","⚙️ 設定"]
];
let STATE = null;        // 伺服器回傳的整份資料
let CUR_TAB = "warn";
let ONLINE = true;

function deviceId(){
  let id = localStorage.getItem("ecdr_device");
  if(!id){ id = "dev-" + Math.random().toString(36).slice(2) + "-" + Date.now().toString(36);
           localStorage.setItem("ecdr_device", id); }
  return id;
}
function currentUser(){ return localStorage.getItem("ecdr_user") || ""; }
function setUser(n){ localStorage.setItem("ecdr_user", n); }

async function api(method, path, body){
  body = Object.assign({user:currentUser(), deviceId:deviceId()}, body||{});
  const opt = {method, headers:{"Content-Type":"application/json"}};
  if(method!=="GET") opt.body = JSON.stringify(body);
  const res = await fetch(path, opt);
  if(!res.ok){ const j = await res.json().catch(()=>({error:"錯誤"})); throw new Error(j.error||("HTTP "+res.status)); }
  return res.json();
}

async function refresh(){
  try{
    const s = await api("GET","/api/state");
    STATE = s; ONLINE = true;
    localStorage.setItem("ecdr_cache", JSON.stringify(s));
    markOnline(true); render();
  }catch(e){
    // 離線：用快取唯讀顯示
    const c = localStorage.getItem("ecdr_cache");
    if(c){ STATE = JSON.parse(c); ONLINE = false; markOnline(false); render(); }
  }
}
function markOnline(on){
  const w = document.getElementById("whoami");
  if(on){ w.classList.remove("offline"); }
  else  { w.classList.add("offline"); }
}

function toast(msg, isErr){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show" + (isErr?" err":"");
  setTimeout(()=>{ t.className = "toast"; }, 2600);
}

// 統一寫入：成功後刷新；離線時擋下
async function write(method, path, body, okMsg){
  if(!ONLINE){ toast("離線中，無法編輯。連線恢復後再試。", true); return false; }
  try{ await api(method, path, body); if(okMsg) toast(okMsg); await refresh(); return true; }
  catch(e){ toast(e.message, true); return false; }
}

// 需要管理者密碼的動作：跳出輸入框
async function withAdmin(fn){
  const pw = prompt("請輸入管理者密碼：");
  if(pw===null) return;
  return fn(pw);
}

// ===================================================================
// 登入畫面
// ===================================================================
async function bootLogin(){
  let users = [];
  try{ users = await api("GET","/api/users"); }
  catch(e){ const c = localStorage.getItem("ecdr_cache"); if(c) users = JSON.parse(c).users||[]; }
  const g = document.getElementById("userGrid");
  g.innerHTML = "";
  users.forEach(u=>{
    const b = document.createElement("button");
    b.className = "userBtn"; b.textContent = u.name;
    b.onclick = ()=>{ setUser(u.name); enterApp(); };
    g.appendChild(b);
  });
}
async function addUser(){
  const name = document.getElementById("newUserName").value.trim();
  if(!name) return;
  try{ await api("POST","/api/users",{name}); document.getElementById("newUserName").value="";
       toast("已新增成員"); bootLogin(); }
  catch(e){ toast(e.message, true); }
}
function logout(){ localStorage.removeItem("ecdr_user"); location.reload(); }

function enterApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("whoName").textContent = currentUser();
  buildNav();
  refresh();
  setInterval(refresh, 10000); // 每 10 秒輪詢同步
}

function buildNav(){
  const nav = document.getElementById("nav"); nav.innerHTML="";
  TABS.forEach(([id,label])=>{
    const b = document.createElement("button");
    b.textContent = label; b.dataset.tab = id;
    if(id===CUR_TAB) b.classList.add("active");
    b.onclick = ()=>{ CUR_TAB = id; buildNav(); render(); };
    nav.appendChild(b);
  });
}

// ===================================================================
// 通用工具
// ===================================================================
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function vid(id){ return (STATE.videos||[]).find(v=>v.id===id); }
function prod(id){ return (STATE.products||[]).find(p=>p.id===id); }
function fmtDate(d){ return d; }
function lightDot(l){ return `<span class="light ${l||'green'}"></span>`; }

// ===================================================================
// 畫面路由
// ===================================================================
function render(){
  if(!STATE) return;
  const v = document.getElementById("view");
  const banner = ONLINE ? "" :
    `<div class="card" style="border-color:var(--red)">⚠️ 目前離線，顯示的是最後一次同步的資料（唯讀），連線恢復後會自動更新。</div>`;
  v.innerHTML = banner + ({
    warn:viewWarn, cal:viewCal, work:viewWork, dash:viewDash,
    prod:viewProd, videos:viewVideos, score:viewScore, settings:viewSettings
  }[CUR_TAB]||(()=>""))();
}

// ---- 預警中心 ----
function viewWarn(){
  const w = STATE._warnings||{emergency:[],warning:[]};
  const s = STATE.settings||{};
  const lowMat = (STATE.materials||[]).filter(m=>m.status==="待剪").length < (s.materialLowThreshold||5);
  const uncovered = (STATE.videos||[]).filter(v=>v.status==="舊片" && !(v.coverChanged&&v.titleChanged));
  const laggedLang = (STATE.videos||[]).filter(v=>["未開始","二創中"].includes((v.languages?.en?.status))||["未開始","二創中"].includes((v.languages?.th?.status)));
  return `
  <h2>🚨 預警中心</h2>
  <div class="card">
    <div class="row" style="gap:24px">
      <div><span class="pill em">緊急 ${w.emergency.length}</span> <span class="muted">距今 ≤3 天未排滿</span></div>
      <div><span class="pill wa">警告 ${w.warning.length}</span> <span class="muted">距今 4–7 天未排滿</span></div>
    </div>
    ${w.emergency.length?`<p><b>🔴 緊急（最晚 3 天前要排好）：</b> ${w.emergency.map(d=>`<span class="tag">${d}</span>`).join(" ")}</p>`:""}
    ${w.warning.length?`<p><b>🟡 警告（預排須 7 天前完成）：</b> ${w.warning.map(d=>`<span class="tag">${d}</span>`).join(" ")}</p>`:""}
    ${!w.emergency.length&&!w.warning.length?`<p class="pill ok">✅ 未來一週都已排滿</p>`:""}
  </div>
  <div class="card">
    <h2>其他提醒</h2>
    <p>${lowMat?"🟠":"✅"} 待剪素材：庫存 ${(STATE.materials||[]).filter(m=>m.status==="待剪").length} 支 ${lowMat?"（低於門檻，請補拍/補剪）":""}</p>
    <p>${uncovered.length?"🟠":"✅"} 舊片未換封面/標題：${uncovered.length} 支 ${uncovered.length?"（重用前須先更換）":""}</p>
    <p>${laggedLang.length?"🟠":"✅"} 二創未跟上（英/泰）：${laggedLang.length} 支</p>
  </div>`;
}

// ---- 月排程 ----
let CAL_YM = null;
function viewCal(){
  if(!CAL_YM){ const t=new Date(); CAL_YM=[t.getFullYear(), t.getMonth()]; }
  const [y,m] = CAL_YM;
  const first = new Date(y,m,1), startDow=first.getDay(), days=new Date(y,m+1,0).getDate();
  const w = STATE._warnings||{emergency:[],warning:[]};
  let cells = "";
  for(let i=0;i<startDow;i++) cells += `<div></div>`;
  for(let d=1;d<=days;d++){
    const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const day = (STATE.schedule||{})[ds];
    const cnt = (day?.slots||[]).length;
    const cls = w.emergency.includes(ds)?"em":(w.warning.includes(ds)?"wa":"");
    cells += `<div class="day ${cls}" onclick="openDay('${ds}')">
      <div class="dnum">${d}</div>
      <div class="mini">${cnt?`已排 ${cnt} 支`:`<span class="muted">未排</span>`}</div>
    </div>`;
  }
  return `
  <h2>📅 月排程</h2>
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <button class="btn sm sec" onclick="calMove(-1)">← 上月</button>
      <b>${y} 年 ${m+1} 月</b>
      <button class="btn sm sec" onclick="calMove(1)">下月 →</button>
    </div>
    <div class="cal" style="margin-top:12px">
      ${["日","一","二","三","四","五","六"].map(x=>`<div class="dow">${x}</div>`).join("")}
      ${cells}
    </div>
    <p class="muted" style="margin-top:10px">🔴 邊框=緊急(≤3天未排滿)　🟡 邊框=警告(4–7天)　點任一天進入時段排程</p>
  </div>`;
}
function calMove(n){ let [y,m]=CAL_YM; m+=n; if(m<0){m=11;y--;} if(m>11){m=0;y++;} CAL_YM=[y,m]; render(); }

function openDay(ds){
  const day = (STATE.schedule||{})[ds] || {quotas:Object.assign({},STATE.defaultQuotas), slots:[]};
  const cats = (STATE.settings?.categories)||[];
  const templates = STATE.slotTemplates||[];
  const counts = {}; (day.slots||[]).forEach(s=>counts[s.type]=(counts[s.type]||0)+1);
  const quotaInputs = cats.map(c=>`
    <div><label>${esc(c)} 目標數</label>
    <input type="number" min="0" id="q_${esc(c)}" value="${(day.quotas?.[c]??0)}"></div>`).join("");
  const slotRows = (day.slots||[]).map((s,i)=>{
    const v = vid(s.videoId);
    return `<tr>
      <td data-label="時段">${esc(s.time||"")}</td>
      <td data-label="類型"><span class="tag">${esc(s.type||"")}</span></td>
      <td data-label="影片">${esc(v?v.name:(s.videoId||""))}</td>
      <td data-label="狀態">${s.locked?`<span class="pill ok">已上架 ${esc(s.account||"")}</span>`:`<button class="btn sm" onclick="publishSlot('${ds}',${i})">上架</button>`}</td>
      <td data-label="">${s.locked?"":`<button class="btn sm danger" onclick="delSlot('${ds}',${i})">移除</button>`}</td>
    </tr>`;
  }).join("");
  const tplBtns = templates.map(t=>`<button class="btn sm sec" onclick="pickVideo('${ds}','${t.time}','${esc(t.type)}')">${t.time} ${esc(t.type)}</button>`).join(" ");
  showModal(`📅 ${ds} 排程`, `
    <div class="card"><b>每日各類別目標數量</b>（可不同天不同）
      <div class="grid cols3" style="margin-top:8px">${quotaInputs}</div>
      <div class="modalFoot"><button class="btn" onclick="saveQuota('${ds}')">確認送出數量</button></div>
    </div>
    <div class="card"><b>已排時段</b>
      <table class="responsive"><thead><tr><th>時段</th><th>類型</th><th>影片</th><th>狀態</th><th></th></tr></thead>
      <tbody>${slotRows||`<tr><td class="muted">尚未排片</td></tr>`}</tbody></table>
    </div>
    <div class="card"><b>新增排片（依時段範本）</b><div class="row" style="margin-top:8px">${tplBtns}</div>
      <p class="muted">點時段→挑選影片（依成效排序、含使用次數燈號）</p>
    </div>`, null);
}
async function saveQuota(ds){
  const cats = (STATE.settings?.categories)||[];
  const quotas = {}; cats.forEach(c=>quotas[c]=parseInt(document.getElementById("q_"+c).value||"0",10));
  if(await write("POST",`/api/schedule/${ds}/quota`,{quotas},"已更新目標數量")) closeModal();
}
function delSlot(ds,i){ withAdminMaybe(()=>write("DELETE",`/api/schedule/${ds}/slot/${i}`,{},"已移除"),true).then(()=>openDay(ds)); }
async function publishSlot(ds,i){
  if(await write("POST",`/api/schedule/${ds}/publish`,{slotIndex:i},"已上架，已產生發片帳號")) openDay(ds);
}

// 選片彈窗（系統自動建議：依成效排序＋燈號）
function pickVideo(ds,time,type){
  const cap = STATE.settings?.reuseCap||3;
  let list = (STATE.videos||[]).slice();
  // 依成效排序（CTR 優先，其次完播率）
  list.sort((a,b)=>(b.ctr||0)-(a.ctr||0) || (b.completionRate||0)-(a.completionRate||0));
  const rows = list.map(v=>{
    const disabled = v.light==="red";
    const oldNeedCover = v.status==="舊片" && !(v.coverChanged&&v.titleChanged);
    return `<tr>
      <td data-label="">${lightDot(v.light)}</td>
      <td data-label="影片">${esc(v.name)} <span class="tag">${esc(v.type)}</span> <span class="muted">${esc(v.status)}</span></td>
      <td data-label="成效">CTR ${v.ctr||0}% / 完播 ${v.completionRate||0}%</td>
      <td data-label="使用">總 ${v.totalUsed||0}｜30天 ${v.last30dUsed||0}</td>
      <td data-label="">${disabled?`<span class="pill em">已達上限</span>`:(oldNeedCover?`<span class="pill wa">未換封面</span>`:`<button class="btn sm" onclick="addSlot('${ds}','${time}','${esc(type)}','${v.id}')">選此片 ✅</button>`)}</td>
    </tr>`;
  }).join("");
  showModal(`選片到 ${ds} ${time}（${type}）`, `
    <p class="muted">🟢 可用(<${cap}次)　🟡 剩1次　🔴 已達上限不可選</p>
    <table class="responsive"><thead><tr><th></th><th>影片</th><th>成效</th><th>使用次數</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td class="muted">影片庫是空的，請先到影片資料庫或素材工作台新增</td></tr>`}</tbody></table>`, null);
}
async function addSlot(ds,time,type,videoId){
  const v = vid(videoId);
  const slot = {time,type,videoId,productId:v?.productId||null,
                platforms:(STATE.platforms||[]),languages:(STATE.settings?.languages||["zh"])};
  if(await write("POST",`/api/schedule/${ds}/slot`,{slot},"已排入")) openDay(ds);
}

// ---- 素材工作台 ----
function viewWork(){
  const me = currentUser();
  const mine = (STATE.materials||[]).filter(m=>m.claimedBy===me && m.status!=="已完成");
  const pool = (STATE.materials||[]).filter(m=>m.status==="待剪" && !m.claimedBy);
  const langTasks = (STATE.videos||[]).filter(v=>["未開始","二創中"].includes(v.languages?.en?.status)||["未開始","二創中"].includes(v.languages?.th?.status));
  const matRow = (m,inPool)=>{
    return `<tr>
      <td data-label="素材">${esc(m.name)} <span class="tag">${esc(m.type||"")}</span>${m.hasShot?"":' <span class="pill wa">未拍攝</span>'}</td>
      <td data-label="商品">${esc(prod(m.productId)?.name||"")}</td>
      <td data-label="負責">${esc(m.claimedBy||"")}${m.needHelp?' <span class="pill em">需支援</span>':""}</td>
      <td data-label="">${inPool
        ? `<button class="btn sm" onclick="claimMat('${m.id}')">我來剪 ✋</button>`
        : `<button class="btn sm" onclick="finishMat('${m.id}')">完成✔</button>
           <button class="btn sm sec" onclick="helpMat('${m.id}',${!m.needHelp})">${m.needHelp?"取消支援":"求支援"}</button>`}
      </td></tr>`;
  };
  return `
  <h2>✂️ 素材工作台</h2>
  <div class="card">
    <div class="row" style="justify-content:space-between"><b>我的今日工作（${esc(me)}）</b></div>
    <table class="responsive"><thead><tr><th>素材</th><th>商品</th><th>負責</th><th></th></tr></thead>
    <tbody>${mine.map(m=>matRow(m,false)).join("")||`<tr><td class="muted">目前沒有進行中的工作，去下方搶單吧</td></tr>`}</tbody></table>
  </div>
  <div class="card">
    <div class="row" style="justify-content:space-between"><b>待剪素材庫（可自己搶單）</b>
      <button class="btn sm" onclick="newMaterial()">＋ 新增素材</button></div>
    <table class="responsive"><thead><tr><th>素材</th><th>商品</th><th>負責</th><th></th></tr></thead>
    <tbody>${pool.map(m=>matRow(m,true)).join("")||`<tr><td class="muted">沒有待剪素材</td></tr>`}</tbody></table>
  </div>
  <div class="card">
    <b>多語二創待辦（中文母版完成後）</b>
    <table class="responsive"><thead><tr><th>影片</th><th>英文</th><th>泰文</th><th></th></tr></thead>
    <tbody>${langTasks.map(v=>`<tr>
      <td data-label="影片">${esc(v.name)}</td>
      <td data-label="英文">${esc(v.languages?.en?.status||"未開始")}</td>
      <td data-label="泰文">${esc(v.languages?.th?.status||"未開始")}</td>
      <td data-label=""><button class="btn sm" onclick="langTask('${v.id}','en')">認領英文</button>
                        <button class="btn sm" onclick="langTask('${v.id}','th')">認領泰文</button></td>
    </tr>`).join("")||`<tr><td class="muted">沒有待二創的影片</td></tr>`}</tbody></table>
  </div>`;
}
function claimMat(id){ write("POST",`/api/materials/${id}/claim`,{},"已認領，加入今日工作"); }
function finishMat(id){
  const name = prompt("完成的影片名稱（可留原名）：");
  if(name===null) return;
  const driveFolder = prompt("雲端資料夾連結（可空）：")||"";
  write("POST",`/api/materials/${id}/finish`,{name:name||undefined,driveFolder},"已完成並進入新片庫（回報已鎖定）");
}
function helpMat(id,need){
  let note="";
  if(need){ note = prompt("需要什麼支援？簡短說明：")||""; if(note===null) return; }
  write("POST",`/api/materials/${id}/help`,{needHelp:need,helpNote:note}, need?"已標記需要支援":"已取消");
}
function langTask(vid,lang){
  write("PUT",`/api/videos/${vid}/lang/${lang}`,{lang:{status:"二創中",editor:currentUser()}},"已認領二創任務");
}
function newMaterial(){
  const cats=(STATE.settings?.categories)||[];
  showModal("新增素材", `
    <label>素材名稱</label><input id="m_name">
    <label>類型</label><select id="m_type">${cats.map(c=>`<option>${esc(c)}</option>`).join("")}</select>
    <label>對應寵粉商品（可空）</label><select id="m_prod"><option value="">— 無 —</option>${(STATE.products||[]).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select>
    <label>配樂來源（版權，可空）</label><input id="m_music">
    <label><input type="checkbox" id="m_shot" checked style="width:auto"> 已拍攝</label>
  `, async ()=>{
    const material={name:document.getElementById("m_name").value.trim(),
      type:document.getElementById("m_type").value,
      productId:document.getElementById("m_prod").value||null,
      musicSource:document.getElementById("m_music").value,
      hasShot:document.getElementById("m_shot").checked};
    if(!material.name){ toast("請輸入名稱",true); return false; }
    return await write("POST","/api/materials",{material},"已新增素材");
  });
}

// ---- 部門儀表板（手機友善） ----

  const help = DASH.helpList||[];

    const acts = (d.今日動作||[]);
    return `<div class="stat">
      <div class="l">${esc(name)}</div>
      <div>搶單 ${d.搶單.length}　動作 ${acts.length}</div>

    </div>`;

  <h2>📊 部門儀表板 <span class="muted" style="font-size:13px">${today}</span></h2>

    <div class="stat"><div class="n">${p.待剪素材數}</div><div class="l">待剪素材</div></div>
    <div class="stat"><div class="n">${p.新片庫數}</div><div class="l">新片庫</div></div>

  </div>

    <b>🆘 目前需要支援／協助</b>
    ${help.length?help.map(h=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0">
        <span>${esc(h.name)} <span class="muted">(${esc(h.by||"")})</span></span>
        <span class="muted">${esc(h.note||"")}</span></div>`).join(""):`<p class="muted">目前沒有人需要支援 👍</p>`}

  <div class="card"><b>👥 每人今日工作</b>

  </div>`;
}

// ---- 寵粉商品庫 ----

    <td data-label="編號">${esc(p.id)}</td>

  `, async ()=>{
    const product={name:val("p_name"),nickname:val("p_nick"),shoplineLink:val("p_link"),

}

    <td data-label="影片">${esc(v.name)}</td>
    <td data-label="類型"><span class="tag">${esc(v.type||"")}</span> <span class="muted">${esc(v.status||"")}</span></td>
    <td data-label="剪輯">${esc(v.editor||"")}</td>

function editVideo(id){
  const v = id?vid(id):{};
  const cats=(STATE.settings?.categories)||[];
  const users=(STATE.users||[]).map(u=>u.name);
  showModal(id?"編輯影片":"新增影片",`
    <label>影片名稱</label><input id="v_name" value="${esc(v.name||"")}">
    <div class="grid cols2">
      <div><label>類型</label><select id="v_type">${cats.map(c=>`<option ${v.type===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>
      <div><label>新舊</label><select id="v_status"><option ${v.status==="新片"?"selected":""}>新片</option><option ${v.status==="舊片"?"selected":""}>舊片</option></select></div>
    </div>
    <label>剪輯人員</label><select id="v_editor">${users.map(u=>`<option ${v.editor===u?"selected":""}>${esc(u)}</option>`).join("")}</select>

      <div><label>CTR (%)</label><input type="number" step="0.1" id="v_ctr" value="${v.ctr||0}"></div>

      <div><label><input type="checkbox" id="v_cover" ${v.coverChanged?"checked":""} style="width:auto"> 已換封面</label></div>
      <div><label><input type="checkbox" id="v_title" ${v.titleChanged?"checked":""} style="width:auto"> 已換標題</label></div>
    </div>
    <label>配樂來源</label><input id="v_music" value="${esc(v.musicSource||"")}">
    <label>配樂版權到期日</label><input id="v_exp" type="date" value="${esc(v.musicExpiry||"")}">
    ${id?`<p class="muted">使用次數：總 ${v.totalUsed||0}／30天內 ${v.last30dUsed||0}</p>`:""}
  `, async ()=>{
    const video={name:val("v_name"),type:val("v_type"),status:val("v_status"),editor:val("v_editor"),
      ctr:parseFloat(val("v_ctr"))||0,completionRate:parseFloat(val("v_comp"))||0,

      coverChanged:document.getElementById("v_cover").checked,

      musicSource:val("v_music"),musicExpiry:val("v_exp")};
    if(!video.name){ toast("請輸入名稱",true); return false; }
    if(id) return await writeAdmin("PUT",`/api/videos/${id}`,{video},"已更新影片");
    return await write("POST","/api/videos",{video},"已新增影片");

}

// ---- 設定（管理者） ----
function viewSettings(){
  const s=STATE.settings||{};
  return `<h2>⚙️ 設定（修改需管理者密碼）</h2>
  <div class="card"><b>影片類型</b>（逗號分隔，可自行增改）
    <input id="set_cats" value="${esc((s.categories||[]).join(","))}"></div>
  <div class="card"><b>平台清單</b>
    <input id="set_plat" value="${esc((STATE.platforms||[]).join(","))}"></div>
  <div class="card"><b>語言</b>
    <input id="set_langs" value="${esc((s.languages||[]).join(","))}"></div>
  <div class="card"><b>上片時段範本</b>（格式 時間=類型，逗號分隔，例 10:00=舊片,12:00=每日寵粉）
    <input id="set_tpl" value="${esc((STATE.slotTemplates||[]).map(t=>t.time+"="+t.type).join(","))}"></div>
  <div class="card"><b>發片帳號命名樣板</b>
    <input id="set_acct" value="${esc(s.accountTemplate||"YYYYMMDDg##平台")}"></div>
  <div class="card"><div class="grid cols3">
    <div><label>30天使用上限</label><input type="number" id="set_cap" value="${s.reuseCap||3}"></div>
    <div><label>疲乏視窗(天)</label><input type="number" id="set_win" value="${s.reuseWindowDays||30}"></div>
    <div><label>素材低庫存門檻</label><input type="number" id="set_low" value="${s.materialLowThreshold||5}"></div>
  </div>
  <label><input type="checkbox" id="set_newreq" ${s.requireDailyNewVideo?"checked":""} style="width:auto"> 每天固定至少 1 支新片（強制）</label>
  <label>異地備份資料夾（Google Drive 同步路徑，留空=不啟用）</label><input id="set_offsite" value="${esc(s.offsiteBackupDir||"")}">
  </div>
  <div class="card"><b>變更管理者密碼</b>
    <input id="set_pw" type="text" placeholder="留空則不變更">
    <p class="muted">目前密碼用於下方送出驗證</p></div>
  <div class="modalFoot"><button class="btn" onclick="saveSettings()">確認送出設定（需密碼）</button></div>`;
}
async function saveSettings(){
  const settings={
    categories:val("set_cats").split(",").map(x=>x.trim()).filter(Boolean),
    languages:val("set_langs").split(",").map(x=>x.trim()).filter(Boolean),
    accountTemplate:val("set_acct"),
    reuseCap:parseInt(val("set_cap"))||3, reuseWindowDays:parseInt(val("set_win"))||30,
    materialLowThreshold:parseInt(val("set_low"))||5,
    requireDailyNewVideo:document.getElementById("set_newreq").checked,
    offsiteBackupDir:val("set_offsite")
  };
  const plats=val("set_plat").split(",").map(x=>x.trim()).filter(Boolean);
  const tpl=val("set_tpl").split(",").map(x=>{const[a,b]=x.split("=");return{time:(a||"").trim(),type:(b||"").trim()};}).filter(t=>t.time);
  settings.platforms=plats; settings.slotTemplates=tpl;
  const pw=val("set_pw"); if(pw) settings.adminPassword=pw;
  withAdmin(async (adminPassword)=>{
    // platforms/slotTemplates 存在頂層；後端 settings.update 會處理 settings.*，這裡分兩次
    const ok = await writeAdminPw("PUT","/api/settings",{settings,adminPassword},"已更新設定");
  });
}

// ===================================================================
// 管理者寫入輔助
// ===================================================================
async function writeAdmin(method,path,body,okMsg){
  return withAdmin(async(pw)=> writeAdminPw(method,path,Object.assign({adminPassword:pw},body),okMsg));
}
async function writeAdminPw(method,path,body,okMsg){
  if(!ONLINE){ toast("離線中，無法編輯",true); return false; }
  try{ await api(method,path,body); if(okMsg)toast(okMsg); closeModal(); await refresh();
       if(CUR_TAB==="dash"||CUR_TAB==="score") loadDash(); return true; }
  catch(e){ toast(e.message,true); return false; }
}
function withAdminMaybe(fn){ return fn(); }

// ===================================================================
// 彈窗 / 小工具
// ===================================================================
function val(id){ const e=document.getElementById(id); return e?e.value:""; }
function showModal(title, inner, onConfirm){
  const root=document.getElementById("modalRoot");
  root.innerHTML=`<div class="modal"><div class="box">
    <h3>${esc(title)}</h3>${inner}
    <div class="modalFoot">
      <button class="btn sec" onclick="closeModal()">取消</button>
      ${onConfirm?`<button class="btn" id="modalConfirm">確認送出</button>`:""}
    </div></div></div>`;
  if(onConfirm){ document.getElementById("modalConfirm").onclick=async()=>{ const r=await onConfirm(); if(r!==false) closeModal(); }; }
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

// 每 10 秒刷新時，若在儀表板也更新儀表板資料
setInterval(()=>{ if(CUR_TAB==="dash"||CUR_TAB==="score") loadDash(); }, 10000);

// 啟動
if(currentUser()){ enterApp(); } else { bootLogin(); }
</script>
